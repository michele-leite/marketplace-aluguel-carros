version: 2

models:
  - name: int_valid_bookings
    description: "Modelo intermediate com criação de regras e remoção de reservas inválidas (valores zerados)."
    tests:
      - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
          column_A: dt_dropoff
          column_B: dt_pickup
    columns:
      - name: booking_id
        tests:
          - not_null
          - unique

      - name: partner_id
        tests:
          - relationships:
              to: ref('int_partners')
              field: partner_id

      - name: dt_dropoff



      - name: is_outlier_high_value_flag
        description: "Tag para alertar transações atipicamente altas (> 15k)"

      - name: total_amount_brl_amt
        description: "Valor total da reserva convertido para BRL usando a taxa de câmbio da data da reserva"

      - name: daily_rate_brl_amt
        description: "Diária da reserva convertida para BRL usando a taxa de câmbio da data da reserva"

      - name: applied_fx_rate
        description: "Taxa de câmbio aplicada (1 para BRL, exchange_rate para demais moedas)"

      - name: is_missing_fx_rate_flag
        description: "Flag indicando ausência de taxa de câmbio para a combinação moeda/data"
